# For more information about tox, see https://tox.readthedocs.io/en/latest/
[tox]
envlist = py{39,310,311,312}-{linux,macos,windows}, quick, lint
isolated_build=true

[gh-actions]
python =
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312

[gh-actions:env]
PLATFORM =
    ubuntu-latest: linux
    macos-latest: macos
    windows-latest: windows

[testenv]
platform =
    macos: darwin
    linux: linux
    windows: win32
deps =
    pytest>=8.3.5
    pytest-qt>=4.4.0
    pytest-xvfb>=3.0.0
    pytest-cov>=6.0
    pyqt5>=5.15.11
passenv =
    CI
    GITHUB_ACTIONS
    NUMPY_EXPERIMENTAL_ARRAY_FUNCTION
    PYVISTA_OFF_SCREEN
    DISPLAY
    XAUTHORITY
    XDG_RUNTIME_DIR
    QT_QPA_PLATFORM
    PYTEST_QT_API
    USERNAME
    USER
    LOGNAME
    LNAME

commands = pytest -v --color=yes --cov=napari_dinosim --cov-report=xml --import-mode=importlib

[testenv:quick]
description = Quick smoke test for PRs (3-5 min)
deps =
    pytest>=8.3.5
    pytest-cov>=6.0
commands = pytest -v --tb=short src/napari_dinosim/_tests/test_pipeline.py -k "not integration"

[testenv:lint]
description = Run ruff and black checks
skip_install = true
deps =
    ruff
    black
commands =
    ruff check .
    black --check .
